<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuAI | Professional Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #818cf8;
            --success: #22c55e;
            --error: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(129, 140, 248, 0.15) 0%, transparent 40%);
        }

        header {
            width: 100%;
            padding: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .logo {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.05em;
            background: linear-gradient(135deg, #818cf8 0%, #6366f1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        main {
            width: 100%;
            max-width: 900px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .hero {
            text-align: center;
            margin-bottom: 2rem;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            font-weight: 700;
        }

        .hero p {
            color: var(--text-dim);
            font-size: 1.2rem;
        }

        .upload-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem;
            text-align: center;
            backdrop-filter: blur(16px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .upload-card:hover {
            border-color: var(--primary);
            box-shadow: 0 0 40px rgba(99, 102, 241, 0.2);
        }

        .drop-zone {
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 3rem;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            z-index: 2;
        }

        .drop-zone.active {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
        }

        .drop-zone i {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 1rem;
            display: block;
        }

        .drop-zone p {
            font-size: 1.1rem;
            color: var(--text-dim);
        }

        .hidden-input {
            display: none;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem 2.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 1.5rem;
            box-shadow: 0 4px 10px rgba(99, 102, 241, 0.3);
        }

        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(99, 102, 241, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .result-container {
            display: none;
            flex-direction: column;
            gap: 1.5rem;
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .data-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .data-label {
            color: var(--text-dim);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
        }

        .data-value {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text);
        }

        .preview-img {
            max-width: 100%;
            border-radius: 12px;
            margin-top: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .loader {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            margin: 2rem 0;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .confidence-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            margin-top: 1rem;
            overflow: hidden;
        }

        .confidence-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 1s ease;
        }

        .timer-badge {
            font-size: 0.8rem;
            background: rgba(99, 102, 241, 0.1);
            color: var(--accent);
            padding: 0.2rem 0.6rem;
            border-radius: 6px;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        @media (max-width: 768px) {
            .result-grid {
                grid-template-columns: 1fr;
            }
            .hero h1 {
                font-size: 2.2rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">DocuAI.</div>
    </header>

    <main>
        <section class="hero">
            <h1>Intelligent Extraction</h1>
            <p>Upload a document to extract structured intelligence with 99.9% accuracy.</p>
        </section>

        <section class="upload-card">
            <div id="dropZone" class="drop-zone">
                <i>📁</i>
                <p>Drag & drop or click to upload</p>
                <input type="file" id="fileInput" class="hidden-input" accept="image/*,.pdf">
            </div>
            <button id="processBtn" class="btn" disabled>Process Document</button>

            <div id="loader" class="loader">
                <div class="spinner"></div>
                <p>Extracting data using VLM...</p>
            </div>
        </section>

        <section id="resultContainer" class="result-container">
            <div class="result-grid">
                <div class="data-card">
                    <div class="data-label">Document Type</div>
                    <div id="resType" class="data-value">-</div>
                </div>
                <div class="data-card">
                    <div class="data-label">Expiry / Due Date</div>
                    <div id="resDate" class="data-value" style="color: var(--accent);">-</div>
                </div>
                <div class="data-card" style="grid-column: span 2;">
                    <div class="data-label">AI Confidence Score</div>
                    <div id="resConf" class="data-value">-</div>
                    <div class="confidence-bar">
                        <div id="confFill" class="confidence-fill"></div>
                    </div>
                </div>
            </div>

            <div class="data-card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                    <div class="data-label">Processing Performance</div>
                    <div id="resTime" class="timer-badge">-</div>
                </div>
                <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 1rem;">
                    <div class="data-card" style="background: rgba(15, 23, 42, 0.3); padding: 0.8rem;">
                        <div class="data-label" style="font-size: 0.7rem;">OCR</div>
                        <div id="timerOcr" style="font-size: 0.9rem;">-</div>
                    </div>
                    <div class="data-card" style="background: rgba(15, 23, 42, 0.3); padding: 0.8rem;">
                        <div class="data-label" style="font-size: 0.7rem;">AI Reasoning</div>
                        <div id="timerLlm" style="font-size: 0.9rem;">-</div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const processBtn = document.getElementById('processBtn');
        const resultContainer = document.getElementById('resultContainer');
        const loader = document.getElementById('loader');

        let selectedFile = null;

        dropZone.onclick = () => fileInput.click();

        dropZone.ondragover = (e) => {
            e.preventDefault();
            dropZone.classList.add('active');
        };

        dropZone.ondragleave = () => {
            dropZone.classList.remove('active');
        };

        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.classList.remove('active');
            handleFiles(e.dataTransfer.files);
        };

        fileInput.onchange = (e) => {
            handleFiles(e.target.files);
        };

        function handleFiles(files) {
            if (files.length > 0) {
                selectedFile = files[0];
                dropZone.querySelector('p').innerText = selectedFile.name;
                processBtn.disabled = false;
            }
        }

        processBtn.onclick = async () => {
            if (!selectedFile) return;

            const formData = new FormData();
            formData.append('file', selectedFile);

            loader.style.display = 'flex';
            resultContainer.style.display = 'none';
            processBtn.disabled = true;

            try {
                const response = await fetch('/api/process', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.error) {
                    alert('Error: ' + data.message);
                } else {
                    displayResults(data);
                }
            } catch (err) {
                alert('Connection Error: ' + err.message);
            } finally {
                loader.style.display = 'none';
                processBtn.disabled = false;
            }
        };

        function displayResults(data) {
            document.getElementById('resType').innerText = data.document_type || 'Unknown';
            document.getElementById('resDate').innerText = data.expiry_date || 'N/A';
            document.getElementById('resConf').innerText = (data.confidence * 100).toFixed(2) + '%';
            document.getElementById('resTime').innerText = data.processing_time || '-';
            
            document.getElementById('confFill').style.width = (data.confidence * 100) + '%';

            if (data.timers) {
                document.getElementById('timerOcr').innerText = (data.timers.ocr || 0).toFixed(2) + 's';
                document.getElementById('timerLlm').innerText = (data.timers.llm || 0).toFixed(2) + 's';
            }

            resultContainer.style.display = 'flex';
            setTimeout(() => {
                resultContainer.scrollIntoView({ behavior: 'smooth' });
            }, 100);
        }
    </script>
</body>
</html>
